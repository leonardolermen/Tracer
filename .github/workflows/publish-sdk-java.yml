name: Publish SDK to GitHub Pages Maven Repo

on:
  push:
    branches: [ main ]
    paths:
      - 'sdk-java/**'
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to gh-pages branch

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'
          cache: maven

      - name: Build and deploy to local folder
        run: mvn --batch-mode deploy -DskipTests -DaltDeploymentRepository=gh-pages::default::file://${GITHUB_WORKSPACE}/mvn-repo
        working-directory: sdk-java

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mvn-repo
          publish_branch: gh-pages
          keep_files: true # Keep old versions published previously

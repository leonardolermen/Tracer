version: '3.9'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: traceflow
      POSTGRES_PASSWORD: traceflow
      POSTGRES_DB: traceflow
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traceflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    ports:
      - "4317:4317"   # HTTP
      - "4318:4318/udp" # UDP
    environment:
      PORT: "4317"
      UDP_PORT: "4318"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: "info"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://traceflow:traceflow@timescaledb:5432/traceflow"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: "info"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://traceflow:traceflow@timescaledb:5432/traceflow"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "change-this-in-production"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  timescaledb_data:
  redis_data:

# ── Sidecar example ────────────────────────────────────────────────────────────
# Add the following to YOUR docker-compose.yml to instrument any service
# without changing its code. Just redirect the port to the sidecar.
#
# Before:
#   my-service:
#     ports: ["8080:8080"]
#
# After:
#   my-service:
#     (remove the ports mapping — no direct external exposure)
#
#   my-service-sidecar:
#     image: traceflow/sidecar:latest
#     environment:
#       TF_TARGET:        "http://my-service:8080"    # upstream
#       TF_SERVICE_NAME:  "my-service"                # name in TraceFlow
#       TF_WORKSPACE_ID:  "ws_your_workspace_id"      # from Settings page
#       TF_COLLECTOR_URL: "http://collector:4317"      # or your hosted URL
#     ports:
#       - "8080:8080"   # clients talk to the sidecar
#
# That's it. All HTTP traffic is now traced automatically.

